[build]
  command = "npx expo export --platform web && cp -r public/* dist/ 2>/dev/null || true"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  EXPO_NO_TELEMETRY = "1"

# Clean URLs for policy pages — these take precedence over the SPA fallback below
[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/pricing"
  to = "/pricing.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/refund"
  to = "/refund.html"
  status = 200

[[redirects]]
  from = "/support"
  to = "/support.html"
  status = 200

# SPA fallback — everything else goes to the React app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
